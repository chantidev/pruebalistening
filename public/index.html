<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube Subtitles Extractor</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 20h9"/>
          <path d="M16.5 3.5a2.121 2.121 0 1 1 3 3L7 19l-4 1 1-4Z"/>
        </svg>
        <h1>YouTube Subtitles Extractor</h1>
      </div>
      <p class="subtitle">Extrae subtítulos de cualquier video de YouTube en todos los idiomas disponibles</p>
    </header>

    <main>
      <section class="search-section">
        <form id="searchForm">
          <div class="method-selector">
            <label class="method-label">Método de extracción:</label>
            <div class="method-options">
              <label class="method-option">
                <input type="radio" name="method" value="youtubei" checked>
                <span class="method-card">
                  <strong>youtubei.js</strong>
                  <small>InnerTube API — sin API key</small>
                </span>
              </label>
              <label class="method-option">
                <input type="radio" name="method" value="supadata">
                <span class="method-card">
                  <strong>Supadata.ai</strong>
                  <small>API externa — fiable frente a bloqueos de IP</small>
                </span>
              </label>
            </div>
          </div>

          <div class="input-group">
            <input
              type="text"
              id="videoInput"
              placeholder="Pega una URL de YouTube o un ID de video..."
              autocomplete="off"
              spellcheck="false"
            >
            <button type="submit" id="extractBtn">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                <polyline points="7 10 12 15 17 10"/>
                <line x1="12" y1="15" x2="12" y2="3"/>
              </svg>
              Extraer Subtítulos
            </button>
          </div>
        </form>
      </section>

      <div id="loading" class="loading hidden">
        <div class="spinner"></div>
        <p id="loadingText">Buscando idiomas disponibles...</p>
      </div>

      <div id="error" class="error-message hidden"></div>

      <!-- Step 1: Language picker -->
      <section id="langPicker" class="lang-picker hidden">
        <div class="video-info">
          <img id="thumbnail" src="" alt="Video thumbnail">
          <div class="video-details">
            <h2 id="videoTitle"></h2>
            <p id="videoAuthor"></p>
            <p id="videoDuration"></p>
          </div>
        </div>
        <div id="warning" class="warning hidden"></div>
        <div class="lang-picker-body">
          <h3>Selecciona un idioma para extraer</h3>
          <div id="langList" class="lang-list"></div>
        </div>
      </section>

      <!-- Step 2: Player + Subtitles -->
      <section id="results" class="results hidden">
        <div class="player-wrapper">
          <div id="ytPlayer"></div>
        </div>

        <div class="subtitle-content">
          <div class="subtitle-toolbar">
            <div class="subtitle-info">
              <span id="segmentCount"></span>
              <span id="activeLangLabel" class="lang-badge"></span>
            </div>
            <div class="toolbar-actions">
              <button id="backBtn" class="btn-secondary">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="15 18 9 12 15 6"/>
                </svg>
                Cambiar idioma
              </button>
              <button id="copyBtn" class="btn-secondary">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <rect width="14" height="14" x="8" y="8" rx="2" ry="2"/>
                  <path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/>
                </svg>
                Copiar texto
              </button>
              <button id="copyTimestampsBtn" class="btn-secondary">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="12" cy="12" r="10"/>
                  <polyline points="12 6 12 12 16 14"/>
                </svg>
                Copiar con timestamps
              </button>
            </div>
          </div>
          <div id="subtitleList" class="subtitle-list"></div>
        </div>
      </section>
    </main>

    <footer>
      <p>Extracción via <strong>youtubei.js</strong> (InnerTube API) o <strong>Supadata.ai</strong></p>
    </footer>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="https://www.youtube.com/iframe_api"></script>
  <script src="app.js"></script>
</body>
</html>
